<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.12.1/css/all.css" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS -->
    <link rel="stylesheet" href="main.css">
    </link>
    <!-- JS -->
    <script src="/app.js" defer></script>
    <title>Tamagotchi</title>
</head>

<body class = "light">
    <div id="tamaConsole">
        <div id="emboss"></div>
        <section id="buttons">
                <button id="foodBtn"><i class="fas fa-utensils"></i></button>
                <button id = "restBtn"><i class="fas fa-bed"></i></button>
                <button id="playBtn"><i class="fas fa-basketball-ball"></i></button>
        </section>
        <p>Unlicensed Egg Watch</p>
        <section id="tamaScreen">
            <div id="friendo">
                <div class="ghostBody">
                    <section class="eyes">
                        <div class="heart left"></div>
                        <div class="heart right"></div>
                    </section>
                    <section id="mouth"></section>
                </div>
                <section class="bars">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </section>
        </section>
    </div>
</body> 

</html>
