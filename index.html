<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS -->
    <link rel="stylesheet" href="main.css">
    </link>
    <!-- JS -->
    <script src="/app.js" defer></script>
    <title>Tamagotchi</title>
</head>

<body>
    <h1>Tamagotchi!</h1>
    <div id="tamaConsole">
        <section class="buttons">
            <button>food</button>
            <button>rest</button>
            <button>play</button>
        </section>
        <section class="tamaScreen">
            <div class="friendo">
                <div class="circle"></div>
                <div class="square"></div>
            </div>
        </section>
        <section class="bars">
            <div class="bar">food</div>
            <div class="bar">rest</div>
            <div class="bar">play</div>
        </section>
    </div>
</body>

</html>
