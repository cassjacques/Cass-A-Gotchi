<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.12.1/css/all.css" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS -->
    <link rel="stylesheet" href="main.css">
    </link>
    <!-- JS -->
    <script src="/app.js" defer></script>
    <title>Tamagotchi</title>
</head>

<body>
    <div id="tamaConsole">
        <section class="buttons">
            <button class="foodBtn"><i class="fas fa-utensils"></i></button>
            <button class="restBtn"><i class="fas fa-bed"></i></button>
            <button class="playBtn"><i class="fas fa-basketball-ball"></i></button>
        </section>
        <div class="screenImg"></div>
        <p>Unlicensed Egg Watch</p>
        <section class="tamaScreen">
            <div id="friendo">
                <div class = "circle">
                <section class="eyes"><i class="fab fa-gratipay"></i><i class="fab fa-gratipay"></i></section>
                <section class="ruffle"></section>
            </div>
            <section class="bars">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </section>
        </section>
    </div>
</body>

</html>
